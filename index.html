<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIVO Support</title>
  <script>
    (function() {
      const userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      let target = '/en/';
      
      if (userLang.startsWith('zh')) target = '/zh/';
      else if (userLang.startsWith('ja')) target = '/ja/';
      else if (userLang.startsWith('ko')) target = '/ko/';
      
      // 获取当前路径的基础部分（支持 GitHub Pages 子目录）
      const basePath = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
      window.location.replace(basePath + target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=./en/">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
